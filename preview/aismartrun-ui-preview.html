<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AISmartRun UI Preview</title>
  <style>
    :root {
      --color-primary: #40ff5e;
      --color-primary-60: rgba(64, 255, 94, 0.6);
      --color-primary-40: rgba(64, 255, 94, 0.4);
      --color-primary-08: rgba(64, 255, 94, 0.08);
      --color-background: #000000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px;
      background: #050705;
      color: var(--color-primary);
      font-family: Arial, "STHeiti", sans-serif;
    }

    .preview {
      width: 480px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .preview-title {
      margin: 0 0 4px;
      color: var(--color-primary);
      font-size: 22px;
      line-height: 28px;
      font-weight: 700;
    }

    .frame-label {
      margin: 0 0 6px;
      color: var(--color-primary-60);
      font-size: 16px;
      line-height: 20px;
      font-weight: 700;
    }

    .hud-wrap,
    .coach-wrap {
      display: flex;
      flex-direction: column;
      width: 480px;
      height: 150px;
    }

    .hud,
    .coach {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 150px;
      background-color: #000000;
      border: 2px solid var(--color-primary-60);
      border-radius: 12px;
    }

    .hud {
      padding: 7px 10px 6px;
    }

    .hud-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 26px;
      margin-bottom: 4px;
    }

    .runner-logo {
      width: 26px;
      height: 26px;
    }

    .mode-chip,
    .coach-status {
      height: 24px;
      padding: 0 9px;
      border: 2px solid var(--color-primary-60);
      border-radius: 12px;
      color: var(--color-primary);
      font-size: 18px;
      line-height: 22px;
      font-weight: 700;
      background-color: var(--color-primary-08);
    }

    .unified-grid {
      display: grid;
      grid-template-columns: 16px 64px 82px 62px 72px 86px;
      column-gap: 5px;
      height: 76px;
      align-items: center;
    }

    .glasses-grid {
      display: grid;
      grid-template-columns: 112px 92px 96px 112px;
      column-gap: 5px;
      height: 76px;
      align-items: center;
    }

    .run-metric {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 76px;
      border: 2px solid var(--color-primary-40);
      border-radius: 12px;
      background-color: #000000;
    }

    .run-hero,
    .run-main {
      border-left: 3px solid var(--color-primary);
      background-color: var(--color-primary-08);
    }

    .run-value {
      color: var(--color-primary);
      font-size: 28px;
      line-height: 32px;
      font-weight: 700;
      font-family: Menlo, Monaco, monospace;
      text-align: center;
    }

    .run-value-hero,
    .run-value-big {
      font-size: 34px;
      line-height: 36px;
    }

    .metric-label {
      color: var(--color-primary-60);
      font-size: 18px;
      line-height: 20px;
      font-weight: 700;
      text-align: center;
    }

    .zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 76px;
    }

    .dot {
      width: 10px;
      height: 6px;
      margin-bottom: 5px;
      border-radius: 3px;
      background-color: var(--color-primary-40);
    }

    .dot-on {
      background-color: var(--color-primary);
    }

    .passive-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 27px;
      margin-top: 5px;
      border-top: 1px solid var(--color-primary-40);
    }

    .coach-line {
      color: var(--color-primary);
      font-size: 20px;
      line-height: 26px;
      font-weight: 700;
    }

    .footer-source {
      color: var(--color-primary-60);
      font-size: 18px;
      line-height: 24px;
      font-weight: 700;
    }

    .coach {
      padding: 10px 12px;
    }

    .coach-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 30px;
    }

    .coach-left {
      display: flex;
      align-items: center;
      min-width: 110px;
    }

    .coach-mark {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: 2px solid var(--color-primary-60);
      border-radius: 15px;
      background-color: var(--color-primary-08);
    }

    .coach-logo {
      width: 26px;
      height: 26px;
    }

    .coach-title {
      margin-left: 8px;
      color: var(--color-primary);
      font-size: 26px;
      line-height: 30px;
      font-weight: 700;
      font-family: Menlo, Monaco, monospace;
    }

    .single-bubble {
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 64px;
      margin-top: 6px;
      padding: 8px 12px;
      background-color: var(--color-primary-08);
      border: 4px solid var(--color-primary);
      border-radius: 12px;
    }

    .bubble-text {
      color: var(--color-primary);
      font-size: 22px;
      line-height: 28px;
      font-weight: 700;
    }

    .coach-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 30px;
      margin-top: 6px;
    }

    .coach-context {
      color: var(--color-primary-60);
      font-size: 18px;
      line-height: 24px;
      font-weight: 700;
    }

    .btn-mic {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 120px;
      height: 34px;
      background-color: #000000;
      border-radius: 12px;
      border: 4px solid var(--color-primary);
    }

    .btn-mic-txt {
      color: var(--color-primary);
      font-size: 24px;
      line-height: 30px;
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="preview">
    <h1 class="preview-title">AISmartRun 新 UI 预览</h1>

    <section>
      <p class="frame-label">跑步 HUD / 单眼镜模式</p>
      <div class="hud-wrap">
        <div class="hud">
          <div class="hud-top">
            <img class="runner-logo" src="../assets/smartrun-runner-48.png" alt="" />
            <span class="mode-chip">单眼镜模式</span>
          </div>
          <div class="glasses-grid">
            <div class="run-metric run-main">
              <span class="run-value run-value-big">5:38</span>
              <span class="metric-label">配速</span>
            </div>
            <div class="run-metric">
              <span class="run-value run-value-big">168</span>
              <span class="metric-label">步频</span>
            </div>
            <div class="run-metric">
              <span class="run-value run-value-big">1.24</span>
              <span class="metric-label">距离</span>
            </div>
            <div class="run-metric run-main">
              <span class="run-value run-value-big">07:02</span>
              <span class="metric-label">时长</span>
            </div>
          </div>
          <div class="passive-footer">
            <span class="coach-line">节奏很好，保持</span>
            <span class="footer-source">眼镜估算</span>
          </div>
        </div>
      </div>
    </section>

    <section>
      <p class="frame-label">跑步 HUD / 心率接入</p>
      <div class="hud-wrap">
        <div class="hud">
          <div class="hud-top">
            <img class="runner-logo" src="../assets/smartrun-runner-48.png" alt="" />
            <span class="mode-chip">心率接入</span>
          </div>
          <div class="unified-grid">
            <div class="zone">
              <div class="dot"></div>
              <div class="dot dot-on"></div>
              <div class="dot dot-on"></div>
              <div class="dot dot-on"></div>
              <div class="dot dot-on"></div>
            </div>
            <div class="run-metric run-hero">
              <span class="run-value run-value-hero">152</span>
              <span class="metric-label">心率</span>
            </div>
            <div class="run-metric">
              <span class="run-value">5:42</span>
              <span class="metric-label">配速</span>
            </div>
            <div class="run-metric">
              <span class="run-value">170</span>
              <span class="metric-label">步频</span>
            </div>
            <div class="run-metric">
              <span class="run-value">2.36</span>
              <span class="metric-label">距离</span>
            </div>
            <div class="run-metric">
              <span class="run-value">13:28</span>
              <span class="metric-label">时长</span>
            </div>
          </div>
          <div class="passive-footer">
            <span class="coach-line">呼吸放稳，配速别急</span>
            <span class="footer-source">心率+眼镜</span>
          </div>
        </div>
      </div>
    </section>

    <section>
      <p class="frame-label">AI 语音教练</p>
      <div class="coach-wrap">
        <div class="coach">
          <div class="coach-top">
            <div class="coach-left">
              <div class="coach-mark">
                <img class="coach-logo" src="../assets/smartrun-runner-48.png" alt="" />
              </div>
              <span class="coach-title">教练</span>
            </div>
            <span class="coach-status">待命</span>
          </div>
          <div class="single-bubble">
            <span class="bubble-text">当前配速稳定，肩膀放松。</span>
          </div>
          <div class="coach-bottom">
            <span class="coach-context">配速 心率 节奏</span>
            <div class="btn-mic">
              <span class="btn-mic-txt">开始问</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
